services:
  kafka:
    image: apache/kafka:4.0.0
    container_name: kafka-broker
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://:29092,CONTROLLER://:9093,PLAINTEXT_HOST://:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_NUM_PARTITIONS: 3
    healthcheck:
      test:
        [
          "CMD",
          "/opt/kafka/bin/kafka-broker-api-versions.sh",
          "--bootstrap-server",
          "localhost:9092"
        ]
      interval: 10s
      timeout: 10s
      retries: 10
  kafka-ui:
    # NOTE: provectuslabs/kafka-ui was abandoned by its maintainers in late 2023.
    # The last release (v0.7.2, April 2024) predates Kafka 4.0 (released 2025)
    # and is known to have "topics not listed" issues. Using the actively
    # maintained community fork instead.
    image: ghcr.io/kafbat/kafka-ui:v1.3.0
    container_name: kafka-ui
    depends_on:
      kafka:
        condition: service_healthy
      topic-setup:
        condition: service_completed_successfully
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local-kafka
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
  topic-setup:
    image: apache/kafka:4.0.0
    container_name: kafka-topic-setup
    depends_on:
      kafka:
        condition: service_healthy
    command: >
      /bin/sh -c "
      /opt/kafka/bin/kafka-topics.sh
        --bootstrap-server kafka:29092
        --create
        --if-not-exists
        --topic order-events
        --partitions 3
        --replication-factor 1;
      echo 'Topic order-events is ready.';
      "
  order-producer:
    image: apache/kafka:4.0.0
    container_name: kafka-order-producer
    depends_on:
      topic-setup:
        condition: service_completed_successfully
    command: >
      /bin/sh -c "
      i=1;
      while true; do
        event=\"order_id=$$i,user=user$$((($$i % 5) + 1)),item=book,amount=$$((100 + $$i)),status=CREATED\";
        echo \"Produced: $$event\" >&2;
        echo \"$$event\";
        i=$$((i + 1));
        sleep 3;
      done | /opt/kafka/bin/kafka-console-producer.sh
        --bootstrap-server kafka:29092
        --topic order-events
      "
  order-consumer:
    image: apache/kafka:4.0.0
    container_name: kafka-order-consumer
    depends_on:
      topic-setup:
        condition: service_completed_successfully
    command: >
      /bin/sh -c "
      sleep 5;
      /opt/kafka/bin/kafka-console-consumer.sh
        --bootstrap-server kafka:29092
        --topic order-events
        --group order-consumer-group
        --from-beginning
        --property print.partition=true
        --property print.offset=true
      "